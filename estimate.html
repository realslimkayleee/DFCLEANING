<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Free Estimate | DF Cleaning</title>
  <meta name="description" content="Request a free cleaning estimate from DF Cleaning. Fill out our simple form and our team will get back to you with a custom quote.">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/header.js" defer></script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
</head>
<body class="global-bg">

  <site-header root-path=""></site-header>

  <main>
    <!-- ESTIMATE PAGE V2 (TWO-COLUMN LUXURY) -->
    <div class="estimate-page-wrapper">
      <!-- Background Image Integration -->
      <img src="assets/hero_house.png" alt="DF Cleaning services" class="estimate-bg-image" />
      <div class="estimate-bg-overlay"></div>
      
      <div class="estimate-container">
        <!-- LEFT COLUMN: INFO PANEL -->
        <div class="estimate-info-panel reveal-up">
          <div class="estimate-headline-group">
            <h1>Request Estimate<span class="text-blue">.</span></h1>
            <p>Fill out the form and we'll get back to you with a fast, no-obligation estimate.</p>
          </div>
          
          <div class="estimate-contact-cards">
            <!-- Call Us Card -->
            <div class="estimate-card">
              <div class="estimate-card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
              </div>
              <div class="estimate-card-content">
                <h3>Call Us</h3>
                <a href="tel:+17373679177">(737) 367-9177</a>
              </div>
            </div>
            
            <!-- Availability Card -->
            <div class="estimate-card">
              <div class="estimate-card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
              </div>
              <div class="estimate-card-content">
                <h3>Business Hours</h3>
                <p>We're Available! Open 24/7</p>
              </div>
            </div>
          </div>
        </div>
        
        <!-- RIGHT COLUMN: FORM CARD -->
        <div class="estimate-form-card reveal-up" style="transition-delay: 0.2s;">
          <div class="estimate-form-header">
            <div class="icon-wrap">
              <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
                <line x1="16" y1="13" x2="8" y2="13"></line>
                <line x1="16" y1="17" x2="8" y2="17"></line>
                <polyline points="10 9 9 9 8 9"></polyline>
              </svg>
            </div>
            <h2>Tell Us About Your Project</h2>
            <p>Our estimates are completely customized based on your specific needs and space.</p>
          </div>
          
          <form id="estimate-form-v2" action="https://formsubmit.co/darwin@dfcleaning.com" method="POST">
            <!-- FormSubmit Options -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New Estimate Request (DF Cleaning)">
            
            <div class="estimate-form-grid">
              <!-- Name -->
              <div class="estimate-form-group">
                <label for="name" class="estimate-form-label">Full Name *</label>
                <input type="text" id="name" name="name" class="estimate-input" placeholder="John Doe" required>
              </div>
              
              <!-- Phone -->
              <div class="estimate-form-group">
                <label for="phone" class="estimate-form-label">Phone Number *</label>
                <input type="tel" id="phone" name="phone" class="estimate-input" placeholder="(123) 456-7890" required>
              </div>
              
              <!-- Email -->
              <div class="estimate-form-group full-width">
                <label for="email" class="estimate-form-label">Email Address *</label>
                <input type="email" id="email" name="email" class="estimate-input" placeholder="john@example.com" required>
              </div>
              
              <!-- Service Type -->
              <div class="estimate-form-group full-width">
                <label for="service" class="estimate-form-label">Service Needed *</label>
                <select id="service" name="service" class="estimate-input" required>
                  <option value="" disabled selected>Select a service...</option>
                  <option value="residential">Residential Cleaning</option>
                  <option value="commercial">Commercial Cleaning</option>
                  <option value="move-in-out">Move-In / Move-Out</option>
                  <option value="deep-clean">Deep Cleaning</option>
                  <option value="post-construction">Post-Construction</option>
                  <option value="power-washing">Power Washing</option>
                  <option value="window">Window Washing</option>
                  <option value="carpet">Carpet Cleaning</option>
                  <option value="coaching">Coaching</option>
                  <option value="other">Other / Not Sure</option>
                </select>
              </div>
              
              <!-- Details -->
              <div class="estimate-form-group full-width">
                <label for="details" class="estimate-form-label">Project Details</label>
                <textarea id="details" name="details" class="estimate-input" placeholder="Tell us about the size of your space, specific areas of focus, or any special instructions..."></textarea>
              </div>
            </div>
            
            <!-- CTA Actions -->
            <div class="estimate-form-actions">
              <a href="tel:+17373679177" class="btn-estimate-secondary">Call Us Instead</a>
              <button type="submit" class="btn-estimate-primary">
                Request Estimate
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                  <polyline points="12 5 19 12 12 19"></polyline>
                </svg>
              </button>
            </div>
          </form>

          <script>
            // Ensure FormSubmit redirects to the thanks page instead of default captcha success page
            document.addEventListener("DOMContentLoaded", () => {
              const form = document.getElementById("estimate-form-v2");
              if (form) {
                const nextInput = document.createElement("input");
                nextInput.type = "hidden";
                nextInput.name = "_next";
                let currentPath = window.location.pathname;
                let pathBase = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
                nextInput.value = window.location.origin + pathBase + "thanks.html";
                form.appendChild(nextInput);
              }
            });
          </script>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <site-footer root-path=""></site-footer>

  <script src="js/main.js"></script>
</body>
</html>
