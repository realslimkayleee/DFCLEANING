<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get a Free Estimate | DF Cleaning</title>
  <meta name="description" content="Request a free cleaning estimate from DF Cleaning. Fill out our simple form and our team will contact you promptly. Serving Austin, Houston, Dallas. Call (737) 367-9177.">
  <link rel="stylesheet" href="css/style.css?v=july4">
  <script src="js/header.js?v=july4" defer></script>
  <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
  <link rel="icon" type="image/png" href="assets/logo2browswer.png">
</head>
<body class="global-bg">

  <site-header root-path=""></site-header>

  <main>
    <!-- ESTIMATE PAGE V2 (TWO-COLUMN LUXURY) -->
    <div class="ep-page-wrapper">
      <!-- Background Image Integration -->
      <img src="assets/hero_house.png" alt="DF Cleaning services" class="ep-bg-image" />
      <div class="ep-bg-overlay"></div>
      
      <div class="ep-container">
        <!-- LEFT COLUMN: INFO PANEL -->
        <div class="ep-info-panel reveal-up">
          <div class="ep-headline-group">
            <h1>Request Estimate<span class="text-blue">.</span></h1>
            <p>Fill out the form and we'll get back to you with a fast, no-obligation estimate.</p>
          </div>
          
          <div class="ep-contact-cards">
            <!-- Call Us Card -->
            <a href="tel:+17373679177" class="ep-card" style="text-decoration: none;">
              <div class="ep-card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
              </div>
              <div class="ep-card-content">
                <h3>Call Us</h3>
                <p>(737) 367-9177</p>
              </div>
            </a>
            
            <!-- Availability Card -->
            <div class="ep-card non-clickable">
              <div class="ep-card-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
              </div>
              <div class="ep-card-content">
                <h3>Business Hours</h3>
                <p>We're Available! Open 24/7</p>
              </div>
            </div>
          </div>
        </div>

        <!-- RIGHT COLUMN: FORM CARD -->
        <div class="ep-form-card reveal-up" style="transition-delay: 0.2s;">
          <div class="ep-form-header">
            <h2>Tell Us About Your Project</h2>
            <p style="margin-bottom: 1rem;">Our estimates are completely customized based on your specific needs and space.</p>
          </div>
          
          <site-contact-form root-path="" estimate-page></site-contact-form>
        </div>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <site-footer root-path=""></site-footer>

  <script src="js/main.js"></script>
</body>
</html>
